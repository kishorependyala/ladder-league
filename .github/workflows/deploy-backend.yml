name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".pytest_cache/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ladder-league-backend
          package: backend-deploy.zip
          startup-command: 'gunicorn --bind=0.0.0.0:8000 --timeout 120 --workers 2 -k uvicorn.workers.UvicornWorker app.main:app'

      - name: Warm up backend
        run: |
          echo "Waiting for app to start..."
          sleep 30
          curl -s --max-time 60 https://ladder-league-backend.azurewebsites.net/api/sports || true
          echo "Backend warmed up."
